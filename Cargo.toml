[package]
name = "crocheteer"
version = "0.0.1"
edition = "2024"

[workspace]
members = [
    # crochet algorithms
    "crates/crochet",
    # fork to change control scheme TODO init submodule
    "crates/bevy_editor_cam",
    # fork for semantic highlighting TODO init submodule
    "crates/egui_code_editor",
]
resolver = "2"

[workspace.dependencies]
glam = "0.30.10" # should be same as used by bevy

[dependencies]
crochet = { path = "crates/crochet" }
bevy = { version = "0.17.3", features = ["dynamic_linking"] }

[profile.dev]
opt-level = 1 # enable bevy dynamic linking

[profile.dev.package."*"]
opt-level = 3 # enable bevy dynamic linking
